<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究生管理系统 - 论文选题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .navbar {
            width: 100%; height: 60px; background: #1890ff;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .navbar-left { display: flex; align-items: center; }
        .logo {
            width: 32px; height: 32px; background: #fff; border-radius: 4px;
            margin-right: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold; color: #1890ff;
        }
        .navbar-title { color: #fff; font-size: 16px; font-weight: bold; }
        .navbar-right { display: flex; align-items: center; gap: 16px; }
        .user-info { color: #fff; font-size: 13px; }
        .logout-btn {
            background: rgba(255,255,255,0.2); color: #fff; border: none;
            padding: 6px 16px; border-radius: 4px; font-size: 13px; cursor: pointer;
        }

        .main-container { display: flex; padding-top: 60px; min-height: 100vh; }

        .sidebar {
            width: 200px; background: #fff; border-right: 1px solid #e8e8e8;
            padding: 20px 0; position: fixed; top: 60px; left: 0; bottom: 0;
        }
        .sidebar-title { padding: 12px 24px; font-size: 14px; color: #999; font-weight: 500; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li {
            padding: 12px 24px; color: #333; font-size: 14px; cursor: pointer;
            border-left: 3px solid transparent; transition: all 0.3s;
        }
        .sidebar-menu li:hover { background: #f0f2f5; }
        .sidebar-menu li.active { background: #e6f7ff; color: #1890ff; border-left-color: #1890ff; }

        .content { flex: 1; margin-left: 200px; padding: 24px; }

        .page-header { margin-bottom: 20px; }
        .page-title { font-size: 20px; color: #333; font-weight: 600; }
        .page-subtitle { font-size: 13px; color: #999; margin-top: 6px; }

        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary { background: #1890ff; color: #fff; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-default { background: #fff; border: 1px solid #d9d9d9; color: #333; }
        .btn-default:hover { border-color: #1890ff; color: #1890ff; }

        /* 选题申请表单 */
        .form-card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            max-width: 900px;
        }
        .form-section {
            margin-bottom: 32px;
        }
        .form-section-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 16px;
        }
        .form-row.single { grid-template-columns: 1fr; }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-label {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        .form-label .required { color: #f5222d; margin-left: 4px; }
        .form-input {
            height: 40px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 0 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        .form-textarea {
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 12px;
            font-size: 14px;
            outline: none;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        .form-textarea:focus { border-color: #1890ff; }

        .file-upload {
            border: 1px dashed #d9d9d9;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload:hover { border-color: #1890ff; color: #1890ff; }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        /* 历史记录 */
        .history-card {
            background: #fff;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .history-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .history-list {
            padding: 0 20px;
        }
        .history-item {
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:last-child { border-bottom: none; }
        .history-title { font-size: 14px; color: #333; }
        .history-meta { font-size: 12px; color: #999; margin-top: 4px; }
        .history-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-approved { background: #f6ffed; color: #52c41a; }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-rejected { background: #fff1f0; color: #f5222d; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <div class="logo">研</div>
            <span class="navbar-title">研究生管理系统</span>
        </div>
        <div class="navbar-right">
            <span class="user-info">张三（计算机科学与技术）</span>
            <button class="logout-btn">退出登录</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-title">培养管理</div>
            <ul class="sidebar-menu">
                <li>📋 个人培养计划</li>
                <li>👨‍🏫 师生双选</li>
                <li>📄 培养方案</li>
                <li class="active">📝 论文选题</li>
                <li>📊 中期考核</li>
            </ul>
        </div>

        <div class="content">
            <div class="page-header">
                <h1 class="page-title">学位论文选题申请</h1>
                <p class="page-subtitle">填写论文选题信息并提交导师审核</p>
            </div>

            <!-- 选题申请表单 -->
            <div class="form-card">
                <form>
                    <!-- 基本信息 -->
                    <div class="form-section">
                        <h3 class="form-section-title">📝 基本信息</h3>
                        <div class="form-row">
                            <div class="form-item">
                                <label class="form-label">论文题目<span class="required">*</span></label>
                                <input type="text" class="form-input" placeholder="请输入论文题目">
                            </div>
                            <div class="form-item">
                                <label class="form-label">研究方向<span class="required">*</span></label>
                                <select class="form-input">
                                    <option value="">请选择研究方向</option>
                                    <option>人工智能</option>
                                    <option>机器学习</option>
                                    <option>深度学习</option>
                                    <option>计算机视觉</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-item">
                                <label class="form-label">指导教师<span class="required">*</span></label>
                                <input type="text" class="form-input" value="李明 教授" readonly>
                            </div>
                            <div class="form-item">
                                <label class="form-label">题目来源<span class="required">*</span></label>
                                <select class="form-input">
                                    <option value="">请选择题目来源</option>
                                    <option>导师课题</option>
                                    <option>自选课题</option>
                                    <option>企业合作项目</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 选题内容 -->
                    <div class="form-section">
                        <h3 class="form-section-title">📄 选题内容</h3>
                        <div class="form-row single">
                            <div class="form-item">
                                <label class="form-label">研究背景与意义<span class="required">*</span></label>
                                <textarea class="form-textarea" placeholder="请详细描述研究背景、研究意义及国内外研究现状..."></textarea>
                            </div>
                        </div>
                        <div class="form-row single">
                            <div class="form-item">
                                <label class="form-label">研究内容与方案<span class="required">*</span></label>
                                <textarea class="form-textarea" placeholder="请描述拟采取的研究方法、技术路线、主要研究内容..."></textarea>
                            </div>
                        </div>
                        <div class="form-row single">
                            <div class="form-item">
                                <label class="form-label">预期成果</label>
                                <textarea class="form-textarea" placeholder="请描述论文预期达成的目标和创新点..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 附件上传 -->
                    <div class="form-section">
                        <h3 class="form-section-title">📎 附件材料</h3>
                        <div class="form-row single">
                            <div class="form-item">
                                <label class="form-label">开题报告书<span class="required">*</spanlabel>
                                <div class="file-upload">
                                    点击或拖拽文件至此处上传<br>
                                    <span style="font-size: 12px;">支持 .doc, .docx, .pdf 格式，大小不超过 10MB</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="form-actions">
                        <button class="btn btn-default">保存草稿</button>
                        <button class="btn btn-primary">提交申请</button>
                    </div>
                </form>
            </div>

            <!-- 历史记录 -->
            <div class="history-card">
                <div class="history-header">📋 历史选题记录</div>
                <div class="history-list">
                    <div class="history-item">
                        <div>
                            <div class="history-title">基于深度学习的图像识别研究</div>
                            <div class="history-meta">提交时间：2024-12-15 · 导师：李明 教授</div>
                        </div>
                        <span class="history-status status-approved">已通过</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
